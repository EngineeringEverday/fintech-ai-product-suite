name: Monorepo CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web-builds:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - clauseguard
          - insightdraft
          - kyb-donut/frontend
          - merchant-risk-scoring/frontend
          - merchvault
          - open-cms-payments/frontend
          - signalmap
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      - run: npm ci
      - run: npm run check
        if: matrix.project == 'clauseguard'
      - run: npm run build

  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - merchant-risk-scoring
          - paycommander
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ${{ matrix.project }}/requirements.txt
      - run: pip install -r requirements.txt pytest
      - run: python -m pytest -q

  settleiq-demo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: settleiq
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: settleiq/requirements.txt
      - run: pip install -r requirements.txt
      - run: python data/mock_generator.py
      - run: python pipeline_runner.py --demo
      - run: python -m py_compile dashboard/app.py agents/*.py skills/*.py
