services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mrs-api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mrs-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"
